name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - name: Verify schema migrations are committed
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
        run: |
          npm run db:generate
          git add -N drizzle
          if ! git diff --exit-code -- drizzle src/server/db/schema.ts; then
            echo "::error::Schema changed but migration was not committed. Run 'npm run db:generate' locally and commit the result."
            exit 1
          fi

      - name: Test with coverage
        run: npm run test:coverage

      - name: Download main coverage for diff
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          branch: main
          name: coverage-summary
          path: main-coverage
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Report coverage on PR
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-summary-compare-path: main-coverage/coverage-summary.json

      - name: Upload coverage summary from main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          retention-days: 30
