# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
tone_instructions: "Be concise and direct. Don't over-explain."

reviews:
  profile: chill
  high_level_summary: false
  poem: false
  request_changes_workflow: false
  sequence_diagrams: false
  in_progress_fortune: false
  estimate_code_review_effort: false

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    ignore_usernames:
      - "github-actions[bot]"
      - "dependabot[bot]"

  path_filters:
    - "!dist/**"
    - "!build/**"
    - "!release/**"
    - "!coverage/**"
    - "!.claude/**"
    - "!.neon"
    - "!drizzle/meta/**"
    - "!package-lock.json"
    - "!**/*.min.js"

  path_instructions:
    - path: "src/server/**/*.ts"
      instructions: >
        Express server. Flag unhandled promise rejections, missing error
        middleware, sync/blocking calls on the request path, and unclosed
        resources (DB clients, streams, timers).
    - path: "src/client/**/*.{ts,tsx}"
      instructions: >
        React client. Flag effects missing cleanup, stale closures, and
        expensive work that should be memoized or debounced.
    - path: "src/shared/**/*.ts"
      instructions: >
        Shared between server and client. Flag server-only concerns
        (fs, process.env, secrets, Node built-ins) leaking into code
        that the client imports.

  pre_merge_checks:
    issue_assessment:
      mode: "off"
    docstrings:
      mode: "off"
    title:
      mode: "warning"
    description:
      mode: "warning"

  finishing_touches:
    simplify:
      enabled: true
    docstrings:
      enabled: false
    unit_tests:
      enabled: false

  tools:
    biome:
      enabled: false
    eslint:
      enabled: false
    oxc:
      enabled: false
    languagetool:
      enabled: false
    gitleaks:
      enabled: true

chat:
  art: false

knowledge_base:
  web_search:
    enabled: true
